name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -ldflags="-H windowsgui" -o RazerBatteryMonitor.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RazerBatteryMonitor
          path: |
            RazerBatteryMonitor.exe
            data/config.toml
